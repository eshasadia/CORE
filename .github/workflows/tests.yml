name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy \
            scipy \
            scikit-image \
            pandas \
            opencv-python-headless \
            tiatoolbox \
            pytest \
            pytest-cov

      - name: Run unit tests
        # Excludes tests that require external API keys or GPU hardware
        run: |
          pytest tests/test_evaluation.py tests/test_padding.py tests/test_util.py tests/test_nuclei_analysis.py -v --tb=short
        env:
          VISION_AGENT_API_KEY: ""
